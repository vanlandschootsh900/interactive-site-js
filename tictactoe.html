<!DOCTYPE html>
<html lang="en">
<head>
    <!-- video I use to help me make this  -->
    <!-- https://www.youtube.com/watch?v=B3pmT7Cpi24-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe page</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .background{
            background-color: #121818;
        }

        .title{
            color: black;
            text-align: center;
            font-size: 40px;
            margin-top: 10px;
        }

        .display {
            color: black;
            text-align: center;
            font-size: 25px;
            margin-top: 1em;
            margin-bottom: 1em;
        }

        .hide{
            display: none;
        }

        .container {
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(3, 33%);
            grid-template-rows: repeat(3, 33%);
            max-width: 300px;
        }
        
        .box{
            border: 1px solid black;
            min-width: 100px;
            min-height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            cursor: pointer;
        }

        .playerX{
            color: aquamarine;
        }

        .playerO{
            color: darkorchid;
        }

        .controls {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            margin-top: 1em;
        }

        #reset{
            background-color: red;
            color: white;
            padding: 8px;
            border-radius: 8px;
            border: none;
            font-size: 20px;
            margin-left: 1em;
            cursor: pointer;
        }


    </style>
    <!-- Java Scripts -->
     <script src="tictac.js"></script>


</head>
<body>
    <div id="main">
        <header>
            <p>Shay's Website</p>
        </header>

        <!-- Nav Starts here-->
        <nav>
            <a id="homenav" class="navbutton" href="home.html">Home</a>

            <a id="game1nav" class="navbutton" href="snake.html">Snake</a>

            <a id="game2nav" class="navbutton" href="tetries.html">Tetris</a>

            <a id="games3nav" class="navbutton" href="tictactoe.html">Tic Tac Toe</a>
        </nav>
        <!-- Nav ends here -->



        <!-- Games Stuff Start Here -->
        <div id="content">
            <section class="title">
                <h1>Tic Tac Toe</h1>
            </section>
            
            <section class="display">
                player <span class="display-player playerX">X</span>'s turn
            </section>

            <section class="container">
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
            </section>

            <section class="display announcer hide"></section>

            <section class="controls">
                <button id="reset">Reset</button>
            </section>





        </div>
        <!--Game stuff Ends here-->
        


        <!-- FOOTER START HERE -->
        <footer>
            <div id="footertext">
                <p>I Made this Website for a end of the year school project. If theres bug I'm sorry</p>
            </div>

            <button id="darkmode" class="footerbuttons">Dark Mode</button>

            <button id="lightmode" class="footerbuttons">Light Mode</button>

        </footer>
        <!-- FOOTER ENDS HERE -->

    </div><!-- main div ends here -->


    <!-- SCRIPTS START HERE  -->
    <script src="main.js"></script>
    <script src="tictac.js"></script>

    
</body>
</html>
